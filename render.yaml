# Blueprint Render depuis la racine du repo.
# Il crée :
# - une base PostgreSQL managée ;
# - l'API NestJS dans backend/ ;
# - le frontend Vite en site statique.
databases:
  - name: goofe-db
    databaseName: goofe
    user: goofe_user
    region: frankfurt
    plan: free

services:
  - type: web
    name: goofe-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: goofe-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: goofe-web
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
